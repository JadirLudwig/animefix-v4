<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos os Animes - AnimeFix</title>
    <link rel="stylesheet" href="/static/netflix.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .all-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px 4%;
            margin-top: 100px;
        }
        .anime-card {
            flex: none; /* Reset row flex */
            width: 100%;
        }
    </style>
</head>
<body>
    <header style="display:flex; justify-content:space-between; align-items:center; padding: 20px 4%; position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--bg-dark);" id="navbar">
        <div class="logo" onclick="window.location.href='/'" style="cursor:pointer">AnimeFix</div>
        <nav style="display:flex; gap: 20px;">
            <a href="/" tabindex="0" style="text-decoration:none; color:white; font-size: 0.9rem;">Home</a>
            <a href="/todos-animes" tabindex="0" style="text-decoration:none; color:var(--netflix-red); font-weight:bold; font-size: 0.9rem;">Todos os Animes</a>
            <a href="/admin" tabindex="0" style="text-decoration:none; color:white; font-size: 0.9rem;">Admin</a>
        </nav>
    </header>

    <div class="all-grid" id="allAnimeGrid">
        <!-- Grid Items -->
    </div>

    <!-- Same Details Modal for consistency -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <button class="close-modal" id="closeModalBtn"><i class="ph ph-x"></i></button>
            <div class="modal-header" id="modalHeaderBanner"></div>
            <div class="modal-body">
                <h2 id="modalAnimeTitle" style="font-size: 2.5rem; margin-bottom: 10px;"></h2>
                <div id="modalAnimeMeta" style="color:var(--text-muted); margin-bottom: 15px; font-size: 0.9rem;"></div>
                <p id="modalAnimeSynopsis" style="margin-bottom: 30px; line-height: 1.6; color: #ccc;"></p>
                <div id="seasonGroups" class="season-groups"></div>
            </div>
        </div>
    </div>

    <!-- Player Panel -->
    <div class="player-panel" id="playerPanel">
        <div class="player-close" id="closePlayerBtn"><i class="ph ph-arrow-left"></i></div>
        <div id="videoContainer" style="width:100%; height:100%">
            <video id="videoPlayer" controls autoplay></video>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        let animeData = [];
        let currentHls = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const res = await fetch('/api/animes');
            animeData = await res.json();
            renderGrid();

            document.getElementById('closeModalBtn').onclick = () => document.getElementById('detailsModal').style.display='none';
            document.getElementById('closePlayerBtn').onclick = () => {
                document.getElementById('playerPanel').style.display='none';
                document.getElementById('videoPlayer').pause();
            };
        });

        function renderGrid() {
            const grid = document.getElementById('allAnimeGrid');
            animeData.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'anime-card';
                card.tabIndex = 0;
                card.innerHTML = `
                    <img src="${anime.poster_url}" alt="${anime.name}">
                    <div class="anime-info">
                        <div class="anime-name">${anime.name}</div>
                    </div>
                `;
                card.onclick = () => showDetails(anime);
                grid.appendChild(card);
            });
        }

        // Mini version of details logic for convenience
        function showDetails(anime) {
            const modal = document.getElementById('detailsModal');
            modal.style.display = 'flex';
            document.getElementById('modalAnimeTitle').textContent = anime.name;
            document.getElementById('modalHeaderBanner').style.backgroundImage = `url('${anime.poster_url}')`;
            document.getElementById('modalAnimeSynopsis').textContent = anime.description;
            
            const seasonGroups = document.getElementById('seasonGroups');
            seasonGroups.innerHTML = '';
            
            anime.episodes.forEach(ep => {
                const item = document.createElement('div');
                item.className = 'ep-item';
                item.tabIndex = 0;
                item.style.padding = '10px';
                item.style.background = '#222';
                item.style.marginBottom = '5px';
                item.style.borderRadius = '5px';
                item.style.cursor = 'pointer';
                item.innerHTML = `Episódio ${ep.number} ${ep.title ? '- ' + ep.title : ''}`;
                item.onclick = () => playEpisode(ep.id, anime.name, ep.number, ep.media_type);
                seasonGroups.appendChild(item);
            });
            
            // Focus first ep item
            const firstEp = seasonGroups.querySelector('.ep-item');
            if (firstEp) firstEp.focus();
        }

        function playEpisode(epId, animeName, epNumber, mediaType) {
            const panel = document.getElementById('playerPanel');
            panel.style.display = 'block';
            
            const video = document.getElementById('videoPlayer');
            const container = document.getElementById('videoContainer');
            const streamUrl = `/stream/${epId}`;
            
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }

            // Cleanup any existing iframe
            const existingIframe = container.querySelector('iframe');
            if (existingIframe) existingIframe.remove();

            if (mediaType === 'youtube' || mediaType === 'iframe') {
                video.style.display = 'none';
                const iframe = document.createElement('iframe');
                iframe.src = streamUrl;
                iframe.referrerPolicy = "no-referrer";
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                iframe.allowFullscreen = true;
                container.appendChild(iframe);
            } else {
                video.style.display = 'block';
                if (Hls.isSupported()) {
                    currentHls = new Hls();
                    currentHls.loadSource(streamUrl);
                    currentHls.attachMedia(video);
                    currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else {
                    video.src = streamUrl;
                    video.play();
                }
            }
        }

        // TV Spatial Navigation Support
        document.addEventListener('keydown', function(e) {
            let current = document.activeElement;
            if (e.key === 'Enter') {
                if (current.onclick) current.onclick();
                else if (current.tagName === 'BUTTON' || current.tagName === 'A') current.click();
            } else if (e.key === 'Escape' || e.key === 'Back' || e.key === 'Backspace') {
                if (document.getElementById('playerPanel').style.display === 'block') {
                    document.getElementById('playerPanel').style.display='none';
                    const video = document.getElementById('videoPlayer');
                    video.pause();
                    if (currentHls) { currentHls.destroy(); currentHls = null; }
                    e.preventDefault();
                } else if (document.getElementById('detailsModal').style.display === 'flex') {
                    document.getElementById('detailsModal').style.display='none';
                    e.preventDefault();
                }
            }
        });

        document.addEventListener('focus', function(e) {
            if (e.target && e.target.scrollIntoView) {
                if (e.target.classList.contains('anime-card') || 
                    e.target.classList.contains('ep-item') ||
                    e.target.tagName === 'BUTTON' ||
                    e.target.tagName === 'A') {
                    e.target.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                }
            }
        }, true);
    </script>
</body>
</html>
